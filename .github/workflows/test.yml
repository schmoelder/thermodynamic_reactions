name: test
on:
  push:
    branches:
      - master
      - dev
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - run: pip install --upgrade pip
      - run: pip install -e ./[all] --group testing
      - run: python -m pytest tests/
