repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
      - id: ruff-format

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        args: [--ignore-words-list, "equil,nd,fo,ans"]
        exclude: "_build|node_modules|.*\\.bib|thermodynamic_potentials\\.drawio"
